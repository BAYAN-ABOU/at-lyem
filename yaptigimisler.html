<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Yaptığım İşler</title>
  
  <!-- 1. إضافة مكتبة التنسيق الخاصة بـ Lightbox لتكبير الصور بشكل احترافي -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/css/lightbox.min.css" rel="stylesheet" />

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 {
      text-align: center;
      color: #764ba2;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      padding: 15px;
      text-align: center;
      transition: transform 0.2s ease; /* تأثير حركة لطيف عند التمرير فوق الكرت */
    }
    .card:hover {
      transform: translateY(-5px);
    }
    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
      cursor: pointer; /* تغيير شكل الماوس ليدل على إمكانية الضغط والتكبير */
    }
    .name {
      font-weight: bold;
      font-size: 1.1rem;
      margin-top: 10px;
    }
    a.back {
      display: inline-block;
      margin-top: 20px;
      text-align: center;
      color: #764ba2;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h1>Yaptığımız İşler</h1>

<div class="grid" id="isler-grid"></div>

<div style="text-align: center;">
  <a class="back" href="products.html">← Geri Dön</a>
</div>

<!-- 2. استدعاء ملفات تشغيل التكبير (jQuery أولاً ثم Lightbox) -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/js/lightbox.min.js"></script>

<script src="js/auth.js"></script>
<script>
  requireLogin();

  const isler = [
    { name: "Jakuzi", img: "images/jakuzi.jpg" },
    { name: "Merdiven Basamağı Kaplama", img: "images/merdiven.jpg" },
    { name: "masa", img: "images/masa.jpg" },
    { name: "banyo", img: "images/banyo.jpg" },
    { name: "villa girişi", img: "images/villagirisi.jpg" },
    { name: "siyah merdiven", img: "images/siyahmerdiven.jpg" },
    { name: "beyaz tezgah", img: "images/tezgah.jpg" },
    { name: "sıyah tezgah", img: "images/siyahtezgah.jpg" },
    { name: "tezgah", img: "images/mutfaktezgahi.jpg" },
    { name: "doğal mermer tezgahı", img: "images/dogaltas.jpg" },
    { name: "mermer lavabo", img: "images/mermerlavabo.jpg" },
    { name: "mermer duvar kaplama", img: "images/mermerduvarkaplama.jpg" },
    { name: "mermer resim", img: "images/mermerresim.jpg" },
    { name: "şimoni", img: "images/simoni.jpg" },
    { name: "mermer kaplamali yer", img: "images/mermerkaplamaliyer.jpg" },
    { name: "bina girişi", img: "images/binagirisi.jpg" },
    { name: "süs havuzu", img: "images/sshavuzu.jpg" },
    { name: "mermer yer kaplama", img: "images/yer.jpg" },
    { name: "merdiven", img: "images/merdiveen.jpg" },
    { name: "bir mağaza işimiz", img: "images/magaza.jpg" },
    { name: "mermer lavabo", img: "images/lavabo.jpg" },
    { name: "asansör", img: "images/asansr.jpg" },
    { name: "italyan lavabo", img: "images/italyanlavabo.jpg" },
    { name: "mermer resim", img: "images/resim.jpg" },
    { name: "mermer resim", img: "images/resiim.jpg" },
    { name: "mermer resim", img: "images/mermerresmi.jpg" },
    { name: "mutfak işimiz", img: "images/mutfakisimiz.jpg" },
    { name: "mermer resim", img: "images/mermerresimm.jpg" },
    { name: "lavabo", img: "images/lavaboo.jpg" },
    { name: "tezgah", img: "images/tezgahh.jpg" },
    { name: "kaplan mermer resmi", img: "images/kaplanmermerresmi.jpg" },
    { name: "mermer koltuk", img: "images/mermerkoltuk.jpg" },
    { name: "mermer resim", img: "images/sultanresmi.jpg" },
  ];

  const grid = document.getElementById('isler-grid');
  isler.forEach(is => {
    const card = document.createElement('div');
    card.className = 'card';
    
    // تم التعديل هنا: تغليف صورة كل منتج برابط تفعيل التكبير مع تمرير تفاصيل الألبوم وعنوان الصورة تلقائياً
    card.innerHTML = `
      <a href="${is.img}" data-lightbox="atolyem-portfolio" data-title="${is.name}">
        <img src="${is.img}" alt="${is.name}">
      </a>
      <div class="name">${is.name}</div>
    `;
    grid.appendChild(card);
  });

  // إعدادات مخصصة لـ Lightbox لتجربة تصفح غاية في السلاسة والسهولة باللغة التركية
  lightbox.option({
    'resizeDuration': 200,      // سرعة ظهور حجم الصورة عند الضغط
    'wrapAround': true,         // إمكانية التنقل اللانهائي بين الصور بالأسهم
    'albumLabel': "Fotoğraf %1 / %2", // كتابة العداد أسفل الصورة (مثلاً: صورة 1 من 33)
    'fadeDuration': 200
  });
</script>

</body>
</html>
