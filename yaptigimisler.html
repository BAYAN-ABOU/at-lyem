<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Yaptığım İşler</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 {
      text-align: center;
      color: #764ba2;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      padding: 15px;
      text-align: center;
    }
    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
    }
    .name {
      font-weight: bold;
      font-size: 1.1rem;
      margin-top: 10px;
    }
    a.back {
      display: inline-block;
      margin-top: 20px;
      text-align: center;
      color: #764ba2;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h1>Yaptığımız İşler</h1>

<div class="grid" id="isler-grid"></div>

<div style="text-align: center;">
  <a class="back" href="products.html">← Geri Dön</a>
</div>

<script src="js/auth.js"></script>
<script>
  requireLogin();

  const isler = [
    { name: "Jakuzi", img: "images/jakuzi.jpg" },
    { name: "Merdiven Basamağı Kaplama", img: "images/merdiven.jpg" },
    { name: "masa", img: "images/masa.jpg" },
    { name: "banyo", img: "images/banyo.jpg" },
    { name: "villa girişi", img: "images/villagirisi.jpg" },
    { name: "siyah merdiven", img: "images/siyahmerdiven.jpg" },
    { name: "beyaz tezgah", img: "images/tezgah.jpg" },
    { name: "sıyah tezgah", img: "images/siyahtezgah.jpg" },
    { name: "tezgah", img: "images/mutfaktezgahi.jpg" },
    { name: "doğal mermer tezgahı", img: "images/dogaltas.jpg" },
    { name: "mermer lavabo", img: "images/mermerlavabo.jpg" },
    { name: "mermer duvar kaplama", img: "images/mermerduvarkaplama.jpg" },
    { name: "mermer resim", img: "images/mermerresim.jpg" },
    { name: "şimoni", img: "images/simoni.jpg" },
    { name: "mermer kaplamali yer", img: "images/mermerkaplamaliyer.jpg" },
    { name: "bina girişi", img: "images/binagirisi.jpg" },
    { name: "süs havuzu", img: "images/sshavuzu.jpg" },
    { name: "mermer yer kaplama", img: "images/yer.jpg" },
    { name: "merdiven", img: "images/merdiveen.jpg" },
    { name: "bir mağaza işimiz", img: "images/magaza.jpg" },
    { name: "mermer lavabo", img: "images/lavabo.jpg" },
    { name: "asansör", img: "images/asansr.jpg" },
    { name: "italyan lavabo", img: "images/italyanlavabo.jpg" },
    { name: "mermer resim", img: "images/resim.jpg" },
    { name: "mermer resim", img: "images/resiim.jpg" },
    { name: "mermer resim", img: "images/mermerresmi.jpg" },
    { name: "mutfak işimiz", img: "images/mutfakisimiz.jpg" },
    { name: "mermer resim", img: "images/mermerresimm.jpg" },
    { name: "lavabo", img: "images/lavaboo.jpg" },
    { name: "tezgah", img: "images/tezgahh.jpg" },
    { name: "kaplan mermer resmi", img: "images/kaplanmermerresmi.jpg" },
    { name: "mermer koltuk", img: "images/mermerkoltuk.jpg" },
    { name: "mermer resim", img: "images/sultanresmi.jpg" },
  ];

  const grid = document.getElementById('isler-grid');
  isler.forEach(is => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <img src="${is.img}" alt="${is.name}">
      <div class="name">${is.name}</div>
    `;
    grid.appendChild(card);
  });
</script>

</body>
</html>
