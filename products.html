<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Ürünler</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #f0f2f5, #dfe9f3);
      padding: 60px 20px;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      color: #333;
      margin-bottom: 40px;
    }

    .card-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 40px;
      max-width: 1200px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      width: 280px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.15);
    }

    .card a {
      text-decoration: none;
      color: #5a3ec8;
      font-size: 1.2rem;
      font-weight: 600;
    }

    .card a:hover {
      color: #000;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }
      .card {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <h1>Ürünler Sayfası</h1>

  <div class="card-container">
    <div class="card">
      <a href="tasturleri.html">Taş Türleri</a>
    </div>
    <div class="card">
      <a href="yaptigimisler.html">Yaptığım İşler</a>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>requireLogin();</script>
</body>
</html>
